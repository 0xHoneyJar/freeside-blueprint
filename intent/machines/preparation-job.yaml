schema_version: 1
id: preparation-job-lifecycle
actor: preparation-job
initial: queued
states:
  - queued
  - indexing
  - completed
  - failed
terminal:
  - completed
  - failed
transitions:
  - from: queued
    on: IndexingStarted
    to: indexing
  - from: queued
    on: SnapshotAlreadyReady
    to: completed
    emits:
      - ownership.ready
  - from: indexing
    on: IndexingCompleted
    to: completed
    emits:
      - ownership.ready
  - from: indexing
    on: PreparationFailed
    to: failed
    emits:
      - prep.failed
invariants:
  - completed emits ownership.ready exactly once by idempotency key
  - failed emits prep.failed exactly once by idempotency key
  - no transition mutates Score
