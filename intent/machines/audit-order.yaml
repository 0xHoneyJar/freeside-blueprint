schema_version: 1
id: audit-order-lifecycle
actor: audit-order
initial: requested
states:
  - requested
  - resolving
  - preparing
  - analyzing
  - ready
  - needs_attention
  - cancelled
terminal:
  - ready
  - cancelled
transitions:
  - from: requested
    on: ResolveContract
    to: resolving
  - from: resolving
    on: ContractResolved
    to: preparing
    effects:
      - PrepareCollection
  - from: preparing
    on: PreparationReady
    to: analyzing
    effects:
      - StartAuditRun
      - GetAccessRiskSnapshot
  - from: preparing
    on: PreparationFailed
    to: needs_attention
  - from: analyzing
    on: AuditProduced
    to: ready
  - from: analyzing
    on: AuditFailed
    to: needs_attention
invariants:
  - ready requires artifact_ref
  - needs_attention requires failure_reason
  - Score catalog state is not part of this machine
