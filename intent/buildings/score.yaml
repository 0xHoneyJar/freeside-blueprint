schema_version: 1
id: score
name: Score
purpose: Own scoring projections and supply versioned access-risk inputs.
owns:
  - scoring_projection
  - score_catalog
accepts:
  - GetAccessRiskSnapshot
  - ConfirmCommunityCatalog
produces:
  - score_snapshot
  - catalog.confirmed
never:
  - infer catalog confirmation from ownership.ready
  - own audit lifecycle
  - own identity or Discord membership
runtime_policy: existing-score-api
