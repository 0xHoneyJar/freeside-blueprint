schema_version: 1
id: ordering
name: Ordering
purpose: Own audit demand, lifecycle, computation run, and data artifact for the MVP.
owns:
  - audit_order
  - audit_run
  - audit_artifact
accepts:
  - PlaceAuditOrder
  - ownership.ready
  - prep.failed
  - score_snapshot
produces:
  - PrepareCollection
  - GetAccessRiskSnapshot
  - audit.produced
  - audit.failed
never:
  - mutate Sonar preparation state
  - mutate Score catalog state
  - own user identity
runtime_policy: existing-ordering-service-with-colocated-audit-module
